---
# https://backstage.io/docs/features/software-catalog/descriptor-format#kind-api
apiVersion: backstage.io/v1alpha1
kind: API
metadata:
  name: meme-factory-http-api
  title: Meme Factory HTTP API
  description: OpenAPI contract used by the web frontend and the caption service to upload assets, request captions, and publish memes.
  annotations:
    github.com/project-slug: 0GiS0/backstage-github-copilot-sdk-demo
    backstage.io/techdocs-ref: dir:./catalog-docs/meme-factory-http-api
  links:
    - url: https://github.com/0GiS0/backstage-github-copilot-sdk-demo
      title: Demo workspace
      icon: github
    - url: http://localhost:3000/docs/default/api/meme-factory-http-api
      title: TechDocs
      icon: docs
  tags:
    - openapi
    - backend
    - contract
spec:
  type: openapi
  lifecycle: production
  owner: group:default/meme-factory-team
  system: meme-factory
  definition: |
    openapi: 3.0.3
    info:
      title: Meme Factory HTTP API
      version: 1.0.0
      description: API contract for uploads, caption generation, and meme publication workflows.
    paths:
      /memes:
        post:
          summary: Upload a screenshot and create a new meme draft
          responses:
            '201':
              description: Meme draft created
      /captions:
        post:
          summary: Generate caption candidates for an uploaded draft
          responses:
            '200':
              description: Caption candidates generated
      /health:
        get:
          summary: Health check endpoint
          responses:
            '200':
              description: Service is healthy
