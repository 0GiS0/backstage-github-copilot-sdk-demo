      icon: docs
  tags:
    - storage
    - shared-resource
    - media
spec:
  type: object-storage
  owner: group:default/meme-factory-team
  system: meme-factory
  dependencyOf:
    - component:default/meme-factory-api
    - component:default/meme-captioner

