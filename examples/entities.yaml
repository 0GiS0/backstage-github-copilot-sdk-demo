---
# https://backstage.io/docs/features/software-catalog/descriptor-format#kind-resource
apiVersion: backstage.io/v1alpha1
kind: Resource
metadata:
  name: meme-vault
  title: Meme Vault
  description: Shared asset store for raw screenshots, generated captions, and final meme exports used by the Meme Factory system.
  annotations:
    github.com/project-slug: 0GiS0/backstage-github-copilot-sdk-demo
