---
# https://backstage.io/docs/features/software-catalog/descriptor-format#kind-component
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: meme-factory-api
  title: Meme Factory API
  description: Core backend for uploads, moderation rules, meme lifecycle, and publication workflows.
  annotations:
    github.com/project-slug: 0GiS0/backstage-github-copilot-sdk-demo
    backstage.io/techdocs-ref: dir:./catalog-docs/meme-factory-api
