---
# https://backstage.io/docs/features/software-catalog/descriptor-format#kind-system
apiVersion: backstage.io/v1alpha1
kind: System
metadata:
  name: copilot-sdk-challenge
  title: Copilot SDK Challenge
  description: Demo system for the GitHub Copilot SDK challenge showcase.
spec:
  owner: copilot-sdk-challenge-team
---
# https://backstage.io/docs/features/software-catalog/descriptor-format#kind-component
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: example-website
  title: Copilot SDK Demo Portal
  description: Showcase component for the Copilot SDK challenge Backstage demo.
spec:
  type: website
  lifecycle: experimental
  owner: copilot-sdk-challenge-team
  system: copilot-sdk-challenge
  providesApis: [example-grpc-api]
---
# https://backstage.io/docs/features/software-catalog/descriptor-format#kind-api
apiVersion: backstage.io/v1alpha1
kind: API
metadata:
  name: example-grpc-api
  title: Copilot SDK Demo API
  description: Example gRPC API exposed by the Copilot SDK challenge demo component.
spec:
  type: grpc
  lifecycle: experimental
  owner: copilot-sdk-challenge-team
  system: copilot-sdk-challenge
  definition: |
    syntax = "proto3";

    service Exampler {
      rpc Example (ExampleMessage) returns (ExampleMessage) {};
    }

    message ExampleMessage {
      string example = 1;
    };
