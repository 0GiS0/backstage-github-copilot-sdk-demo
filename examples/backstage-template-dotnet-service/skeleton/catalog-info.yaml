apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: ${{values.name}}
  title: ${{values.name}}
  description: |
    ${{values.description}}
  annotations:
    github.com/project-slug: ${{values.destination.owner}}/${{values.destination.repo}}
    backstage.io/techdocs-ref: dir:.
  links:
    - url: https://github.com/${{values.destination.owner}}/${{values.destination.repo}}
      title: Repository
      icon: github
    - url: https://github.com/${{values.destination.owner}}/${{values.destination.repo}}/tree/main/docs
      title: Docs
      icon: docs
  tags:
    - dotnet
    - csharp
    - aspnet-core
    - microservice
spec:
  type: service
  lifecycle: production
  owner: ${{values.teamOwner}}
  system: ${{values.system}}
  providesApis:
    - ${{values.name}}-api
  dependsOn:
    - resource:database
---
apiVersion: backstage.io/v1alpha1
kind: API
metadata:
  name: ${{values.name}}-api
  title: ${{values.name}} API
  description: API for managing ${{values.name}}
  annotations:
    github.com/project-slug: ${{values.destination.owner}}/${{values.destination.repo}}
  links:
    - url: https://github.com/${{values.destination.owner}}/${{values.destination.repo}}
      title: Repository
      icon: github
    - url: https://github.com/${{values.destination.owner}}/${{values.destination.repo}}/tree/main/docs/api
      title: API docs
      icon: docs
spec:
  type: openapi
  lifecycle: production
  owner: ${{values.teamOwner}}
  system: ${{values.system}}
  definition: |
    openapi: 3.0.0
    info:
      title: ${{values.name}} API
      version: 1.0.0
      description: API for managing ${{values.name}}
    paths:
      /api/${{values.name}}:
        get:
          summary: List all ${{values.name}}
          responses:
            '200':
              description: List of ${{values.name}}
      /api/health:
        get:
          summary: Health check endpoint
          responses:
            '200':
              description: Service is healthy
