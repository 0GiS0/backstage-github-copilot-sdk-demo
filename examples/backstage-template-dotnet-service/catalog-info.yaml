---
apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: dotnet-service
  title: 🔷 .NET Service
  description: Create a new .NET microservice with ASP.NET Core, C#, and best practices
  annotations:
    backstage.io/techdocs-ref: dir:.
    github.com/project-slug: 0GiS0/backstage-template-dotnet-service
  tags:
    - dotnet
    - csharp
    - aspnet-core
    - microservice
    - recommended
spec:
  owner: copilot-sdk-challenge-team
  type: service
  parameters:
    - title: 🔷 Complete the form to create a new .NET Service
      required:
        - name
        - description
        - system
        - serviceTier
        - teamOwner
      properties:
        name:
          type: string
          title: 📦 Project Name
          description: The name of the project
          ui:autofocus: true
          ui:field: ValidateKebabCase
        description:
          title: 📝 Description
          type: string
          description: A description for the component
          minLength: 1
          maxLength: 340
          pattern: "^.*\\S.*$"
          ui:help: "Required field. Max 340 characters (GitHub has a 350-byte limit, accented characters count as multiple bytes). Excess whitespace will be normalized automatically."
          ui:options:
            inputProps:
              maxLength: 340
              placeholder: "Enter a clear, concise description of this .NET service..."
          ui:widget: textarea
        owner:
          title: 👥 Select in which group the component will be created
          type: string
          description: The group the component belongs to
          ui:field: MyGroupsPicker
        system:
          title: 🏗️ System
          type: string
          description: The system the component belongs to
          ui:field: EntityPicker
          ui:options:
            catalogFilter:
              kind: System
        serviceTier:
          title: 🏷️ Service Tier
          type: string
          description: Service tier classification for operational support
          default: tier-3
          enum:
            - tier-1
            - tier-2
            - tier-3
            - experimental
          enumNames:
            - "🔴 Tier 1 (Critical)"
            - "🟡 Tier 2 (Important)"
            - "🟢 Tier 3 (Standard)"
            - "🧪 Experimental"
        teamOwner:
          title: 👨‍💼 Team Owner
          type: string
          description: Team responsible for maintaining this repository
          default: copilot-sdk-challenge-team
          ui:field: MyGroupsPicker
        demo:
          title: 🎪 Demo Repository
          type: string
          description: Mark this repository as a demonstration/test repository
          default: "yes"
          enum:
            - "yes"
            - "no"
          enumNames:
            - "🎪 Yes - Demo/Test"
            - "🏭 No - Production"
    - title: 🎯 Choose a destination
      required:
        - repoUrl
      properties:
        repoUrl:
          title: 🔗 Repository URL
          type: string
          description: The URL of the repository
          ui:field: RepoUrlPicker
          ui:options:
            allowedOwners:
              - 0GiS0
            allowedHosts:
              - github.com
  steps:
    - id: fetch-base
      name: 📥 Fetch Template
      action: fetch:template
      input:
        url: ./skeleton
        copyWithoutTemplating:
          - .github/workflows/*
        values:
          name: ${{ parameters.name }}
          owner: ${{ parameters.owner }}
          description: ${{ parameters.description }}
          destination: ${{ parameters.repoUrl | parseRepoUrl }}
          repoUrl: ${{ parameters.repoUrl }}
          serviceTier: ${{ parameters.serviceTier }}
          teamOwner: ${{ parameters.teamOwner }}
          system: ${{ parameters.system }}

    - id: replace-placeholders
      name: 🔄 Replace placeholders in content
      action: roadiehq:utils:fs:replace
      input:
        files:
          # Solution file
          - file: "./BACKSTAGE_ENTITY_NAME.sln"
            find: "BACKSTAGE_ENTITY_NAME"
            replaceWith: ${{ parameters.name | replace("-", "_") }}
          # Main project file
          - file: "./src/BACKSTAGE_ENTITY_NAME.csproj"
            find: "BACKSTAGE_ENTITY_NAME"
            replaceWith: ${{ parameters.name | replace("-", "_") }}
          # Test project file
          - file: "./tests/BACKSTAGE_ENTITY_NAME.Tests.csproj"
            find: "BACKSTAGE_ENTITY_NAME"
            replaceWith: ${{ parameters.name | replace("-", "_") }}
          # Program.cs
          - file: "./src/Program.cs"
            find: "BACKSTAGE_ENTITY_NAME"
            replaceWith: ${{ parameters.name | replace("-", "_") }}
          # Controllers
          - file: "./src/Controllers/*.cs"
            find: "BACKSTAGE_ENTITY_NAME"
            replaceWith: ${{ parameters.name | replace("-", "_") }}
          # Models
          - file: "./src/Models/*.cs"
            find: "BACKSTAGE_ENTITY_NAME"
            replaceWith: ${{ parameters.name | replace("-", "_") }}
          # Test files
          - file: "./tests/*.cs"
            find: "BACKSTAGE_ENTITY_NAME"
            replaceWith: ${{ parameters.name | replace("-", "_") }}
          # DevContainer
          - file: "./.devcontainer/devcontainer.json"
            find: "BACKSTAGE_ENTITY_NAME"
            replaceWith: ${{ parameters.name | replace("-", "_") }}
          - file: "./README.md"
            find: "BACKSTAGE_ENTITY_NAME"
            replaceWith: ${{ parameters.name | replace("-", "_") }}

    - id: rename-files
      name: 📝 Rename template files
      action: fs:rename
      input:
        files:
          # Rename solution file
          - from: ./BACKSTAGE_ENTITY_NAME.sln
            to: ./${{ parameters.name | replace("-", "_") }}.sln
          # Rename main project file
          - from: ./src/BACKSTAGE_ENTITY_NAME.csproj
            to: ./src/${{ parameters.name | replace("-", "_") }}.csproj
          # Rename test project file
          - from: ./tests/BACKSTAGE_ENTITY_NAME.Tests.csproj
            to: ./tests/${{ parameters.name | replace("-", "_") }}.Tests.csproj

    - id: publish
      name: 🚀 Publish to GitHub
      action: publish:github
      input:
        repoUrl: ${{ parameters.repoUrl }}
        description: ${{ parameters.description }}
        topics:
          [
            "backstage-include",
            "0GiS0",
            "dotnet",
            "csharp",
          ]
        defaultBranch: main
        gitCommitMessage: Create .NET service from template
        customProperties:
          service-tier: ${{ parameters.serviceTier }}
          team-owner: ${{ parameters.teamOwner }}
          demo: ${{ parameters.demo }}

    - id: register
      name: 📋 Register
      action: catalog:register
      input:
        catalogInfoUrl: "https://github.com/${{ parameters.repoUrl | parseRepoUrl | pick('owner') }}/${{ parameters.repoUrl | parseRepoUrl | pick('repo') }}/blob/main/catalog-info.yaml"

  output:
    links:
      - title: Repository
        url: ${{ steps["publish"].output.remoteUrl }}
      - title: Open in catalog
        icon: catalog
        entityRef: ${{ steps["register"].output.entityRef }}
